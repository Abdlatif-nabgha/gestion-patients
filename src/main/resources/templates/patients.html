<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{template1}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"

>
<head>
    <meta charset="UTF-8">
    <title>Patients List</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body>
    <div class="container p-3 mt-3" layout:fragment="content1">
        <div class="card">
            <div class="card-header">
                <h2>Liste de patients</h2>
            </div>
            <div class="card-body">
                <form method="get" th:action="@{/user/index}">
                    <div class="mb-3">
                        <label class="form-label">Keyword:</label>
                        <div class="d-flex align-items-center">
                            <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2" style="width: auto;">
                            <button type="submit" class="btn btn-primary">Search</button>
                        </div>
                    </div>
                </form>
                <table class="table">
                    <thead>
                    <tr>
                        <th>Id</th> <th>Nom</th> <th>Date</th> <th>Malade</th> <th>Score</th> <th sec:authorize="hasRole('ADMIN')">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p:${listPatients}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.nom}"></td>
                        <td th:text="${p.dateNaissance}"></td>
                        <td th:text="${p.malade}"></td>
                        <td th:text="${p.score}"></td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <a class="btn btn-danger" onclick="return confirm('You are sure?')"
                               th:href="@{/admin/deletePatient(id=${p.id}, keyword=${keyword}, page=${currentPage})}">
                                Delete
                            </a>
                            <a class="btn btn-success"
                               th:href="@{/admin/editPatient(id=${p.id})}">
                                edit
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <ul class="nav nav-pills">
                    <li th:each="page, status:${pages}">
                        <a th:class="${status.index == currentPage ? 'btn btn-info m-1' : 'btn btn-outline-info m-1'}"
                           th:href="@{/user/index(page=${status.index}, keyword=${keyword})}"
                           th:text="${status.index + 1}"></a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
