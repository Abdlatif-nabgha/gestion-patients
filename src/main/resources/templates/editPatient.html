<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{template1}"
>
<head>
    <meta charset="UTF-8">
    <title>Edit Patient</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-3 p-3" layout:fragment="content1">
        <div class="col-md-6 offset-3">
            <form method="post" th:action="@{/admin/save}">
                <div class="mb-3">
                    <label class="form-label">ID</label>
                    <input class="form-control" type="text" name="id" th:value="${patient.id}" readonly />
                </div>
                <div class="mb-3">
                    <label class="form-label">Nom</label>
                    <input class="form-control" type="text" name="nom" th:value="${patient.nom}" />
                    <span class="text-danger" th:errors="${patient.nom}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date Naissance</label>
                    <input class="form-control" type="date" name="dateNaissance" th:value="${patient.dateNaissance}" />
                    <span class="text-danger" th:errors="${patient.dateNaissance}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Malade</label>
                    <input type="checkbox" name="malade" th:checked="${patient.malade}" />
                    <span class="text-danger" th:errors="${patient.malade}"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Score</label>
                    <input class="form-control" type="text" name="score" th:value="${patient.score}" />
                    <span class="text-danger" th:errors="${patient.score}"></span>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
</body>
</html>
